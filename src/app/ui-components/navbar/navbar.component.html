<nav [class.scrolled]="scrolled()">
  <div class="nav-inner">
    <a routerLink="/home" class="nav-logo" (click)="closeMenu()">
      <span class="logo-text">
        <span class="logo-syntax">&lt;</span><span class="logo-name">Laura</span><span class="logo-syntax"> /&gt;</span><span class="logo-cursor">|</span>
      </span>
    </a>

    <button
      class="menu-toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"

      <span class="hamburger" [class.open]="menuOpen()">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <div class="nav-links" [class.open]="menuOpen()">
      <a routerLink="/home" routerLinkActive="active" (click)="closeMenu()">Home</a>
      <a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Work</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>

  </div>
