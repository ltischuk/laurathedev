<section class="hero">

  <div class="blueprint-bg" aria-hidden="true"></div>

  <div class="hero-content">

    <p class="eyebrow animate-in" style="--delay: 0ms">
      <span class="bracket">[</span> Hi, I'm <span class="bracket">]</span>
    </p>

    <h1 class="hero-name" aria-label="Laura">
      <span class="char" style="--i: 0">L</span><span
      class="char" style="--i: 1">A</span><span
      class="char" style="--i: 2">U</span><span
      class="char" style="--i: 3">R</span><span
      class="char" style="--i: 4">A</span>
    </h1>

    <p class="hero-declaration animate-in" style="--delay: 680ms">
      Building remarkable software,<br>
      <span class="declaration-accent">one bold idea at a time.</span>
    </p>

    <!--
      Build structure — layers animate bottom-to-top like a house being built.
      DOM order is 03 → 02 → 01 (top to bottom visually).
      Delays are shortest for 01 (Foundation, bottom) so it appears first.
    -->
    <div class="build-structure">

      <div class="structure-layer animate-in" style="--delay: 1250ms">
        <div class="layer-rule"></div>
        <div class="layer-body">
          <span class="layer-num">03</span>
          <span class="layer-label">Vision</span>
          <span class="layer-sep">—</span>
          <span class="layer-desc">Innovator & Builder</span>
        </div>
      </div>

      <div class="structure-layer animate-in" style="--delay: 1075ms">
        <div class="layer-rule"></div>
        <div class="layer-body">
          <span class="layer-num">02</span>
          <span class="layer-label">Structure</span>
          <span class="layer-sep">—</span>
          <span class="layer-desc">Engineering Leader</span>
        </div>
      </div>

      <div class="structure-layer animate-in" style="--delay: 900ms">
        <div class="layer-rule"></div>
        <div class="layer-body">
          <span class="layer-num">01</span>
          <span class="layer-label">Foundation</span>
          <span class="layer-sep">—</span>
          <span class="layer-desc">Software Architect</span>
        </div>
      </div>

    </div>

    <div class="hero-actions animate-in" style="--delay: 1500ms">
      <a routerLink="/projects" class="btn btn-primary">View My Work</a>
      <a routerLink="/about" class="btn btn-ghost">About Me</a>
    </div>

  </div>

  <div class="scroll-indicator" aria-hidden="true">
    <div class="scroll-line"></div>
  </div>

</section>
