<section class="hero">
  <div class="hero-content">
    <p class="hero-eyebrow animate-in" style="--delay: 0ms">Hi, I'm</p>
    <h1 class="hero-name animate-in" style="--delay: 150ms">Laura</h1>
    <div class="hero-tags animate-in" style="--delay: 350ms">
      @for (tag of tags; track tag) {
        <span class="tag">{{ tag }}</span>
      }
    </div>
    <div class="hero-actions animate-in" style="--delay: 550ms">
      <a routerLink="/projects" class="btn btn-primary">View My Work</a>
      <a routerLink="/about" class="btn btn-ghost">About Me</a>
    </div>
  </div>

  <div class="scroll-indicator" aria-hidden="true">
    <div class="scroll-line"></div>
  </div>
</section>
