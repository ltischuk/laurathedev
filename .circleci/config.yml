# CircleCI pipeline for laurathedev (Angular 19)
version: 2.1

jobs:
  build-and-deploy:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - run:
          name: Install AWS CLI v2
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
      - run:
          name: Install dependencies and build
          command: npm ci && npm run build
      - deploy:
          name: Deploy to AWS S3
          command: |
            aws s3 sync ./dist/laurathedev/browser/ s3://whointheworldislaurawebsite/ --delete
      - run:
          name: Invalidate CloudFront cache
          command: |
            aws cloudfront create-invalidation --distribution-id E3LRGXGGIFP04Q --paths "/*"

workflows:
  build-and-deploy:
    jobs:
      - build-and-deploy
